workflows:
  ios-release:
    name: VOID FREQ iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 26
      node: 24
      vars:
        BUNDLE_ID: ch.architectdna.voidfreq
        TEAM_ID: V28MG47TZC
      groups:
        - apple_signing

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install signing assets
        script: |
          # Keychain
          security create-keychain -p cmpass build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p cmpass build.keychain
          security set-keychain-settings -t 7200 -u build.keychain

          # P12 cert
          echo "$DIST_P12_BASE64" | base64 --decode > /tmp/dist.p12
          security import /tmp/dist.p12 -k build.keychain -P cmpass -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k cmpass build.keychain

          # Provisioning profile
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_DIR/VoidFreq.mobileprovision"
          echo "Profile UUID: $(security cms -D -i "$PP_DIR/VoidFreq.mobileprovision" 2>/dev/null | grep -A1 UUID | tail -1 | tr -d ' <>/string')"

      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Build IPA
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="VoidFreq Distribution" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=$TEAM_ID

          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/

    artifacts:
      - build/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        api_key: Architect-DNA CI
        submit_to_testflight: true

workflows:
  ios-release:
    name: VOID FREQ iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Architect-DNA CI

    environment:
      xcode: 26
      node: 24
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ch.architectdna.voidfreq

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --archive-xcargs "DEVELOPMENT_TEAM=V28MG47TZC"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

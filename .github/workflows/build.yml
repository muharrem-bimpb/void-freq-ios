name: Build & Submit to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Import Distribution Certificate
        env:
          DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          DIST_KEY_BASE64: ${{ secrets.DIST_KEY_BASE64 }}
        run: |
          # Create temp keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import cert + key
          echo "$DIST_CERT_BASE64" | base64 --decode > dist.cer
          echo "$DIST_KEY_BASE64"  | base64 --decode > dist.key

          # Convert to p12 (auto-detect PEM or DER)
          openssl x509 -in dist.cer -out dist.pem 2>/dev/null || openssl x509 -in dist.cer -inform DER -out dist.pem
          openssl pkcs12 -export -out dist.p12 -inkey dist.key -in dist.pem -passout pass:buildpass

          # Import into keychain
          security import dist.p12 -k build.keychain -P buildpass -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH/VoidFreq.mobileprovision"

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Build IPA
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="VoidFreq Distribution" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=V28MG47TZC

          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          gem install fastlane --no-document
          echo "$ASC_PRIVATE_KEY" > /tmp/asc_key.p8
          node -e "
            const fs = require('fs');
            const key = { key_id: process.env.ASC_KEY_ID, issuer_id: process.env.ASC_ISSUER_ID, key: fs.readFileSync('/tmp/asc_key.p8','utf8'), duration: 1200, in_house: false };
            fs.writeFileSync('/tmp/api_key.json', JSON.stringify(key));
            console.log('API key JSON written');
          "
          fastlane run upload_to_testflight \
            ipa:"build/App.ipa" \
            skip_waiting_for_build_processing:true \
            api_key_path:"/tmp/api_key.json"

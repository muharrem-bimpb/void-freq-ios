name: Submit to App Store Review

on:
  workflow_dispatch:

jobs:
  submit:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Submit to App Store Review
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          echo "$ASC_PRIVATE_KEY" > /tmp/asc_key.p8
          pip3 install PyJWT cryptography requests --quiet --break-system-packages

          python3 << 'PYEOF'
          import jwt, time, requests, os, sys

          key_id    = os.environ["ASC_KEY_ID"]
          issuer_id = os.environ["ASC_ISSUER_ID"]
          private_key = open("/tmp/asc_key.p8").read()
          bundle_id = "ch.architectdna.voidfreq"

          def token():
              payload = {
                  "iss": issuer_id,
                  "iat": int(time.time()),
                  "exp": int(time.time()) + 1200,
                  "aud": "appstoreconnect-v1"
              }
              return jwt.encode(payload, private_key, algorithm="ES256",
                                headers={"kid": key_id})

          H = {"Authorization": f"Bearer {token()}", "Content-Type": "application/json"}
          BASE = "https://api.appstoreconnect.apple.com/v1"

          # Find the app
          r = requests.get(f"{BASE}/apps?filter[bundleId]={bundle_id}", headers=H)
          r.raise_for_status()
          app = r.json()["data"][0]
          app_id = app["id"]
          print(f"App: {app['attributes']['name']} ({app_id})")

          # Get editable app store version
          r = requests.get(f"{BASE}/apps/{app_id}/appStoreVersions?filter[platform]=IOS&filter[appStoreState]=PREPARE_FOR_SUBMISSION,WAITING_FOR_REVIEW,DEVELOPER_REJECTED,REJECTED,METADATA_REJECTED", headers=H)
          r.raise_for_status()
          versions = r.json()["data"]
          if not versions:
              # Try without state filter
              r = requests.get(f"{BASE}/apps/{app_id}/appStoreVersions?filter[platform]=IOS", headers=H)
              r.raise_for_status()
              versions = r.json()["data"]

          # Pick the one that's editable
          editable_states = {"PREPARE_FOR_SUBMISSION", "DEVELOPER_REJECTED", "REJECTED", "METADATA_REJECTED", "INVALID_BINARY"}
          version = next((v for v in versions if v["attributes"]["appStoreState"] in editable_states), None)
          if not version:
              version = versions[0] if versions else None
          if not version:
              print("No version found — create one in App Store Connect first")
              sys.exit(1)

          version_id = version["id"]
          state = version["attributes"]["appStoreState"]
          ver_str = version["attributes"]["versionString"]
          print(f"Version: {ver_str} — state: {state}")

          # Find latest valid build
          r = requests.get(f"{BASE}/builds?filter[app]={app_id}&filter[processingState]=VALID&filter[platform]=IOS&sort=-uploadedDate&limit=1", headers=H)
          r.raise_for_status()
          builds = r.json()["data"]
          if not builds:
              print("No valid build found — TestFlight may still be processing, retry in a few minutes")
              sys.exit(1)
          build = builds[0]
          build_id = build["id"]
          build_ver = build["attributes"]["version"]
          print(f"Build: {build_ver} ({build_id})")

          # Attach build to version
          r = requests.patch(
              f"{BASE}/appStoreVersions/{version_id}",
              headers=H,
              json={"data": {"type": "appStoreVersions", "id": version_id,
                             "relationships": {"build": {"data": {"type": "builds", "id": build_id}}}}}
          )
          if r.status_code not in (200, 204):
              print(f"Attach build response: {r.status_code} {r.text}")

          # Submit for review
          r = requests.post(
              f"{BASE}/appStoreVersionSubmissions",
              headers=H,
              json={"data": {"type": "appStoreVersionSubmissions",
                             "relationships": {"appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}}}}}
          )
          if r.status_code in (200, 201):
              print("Submitted for App Store review!")
          elif r.status_code == 409:
              print("Already submitted or in review")
          else:
              print(f"Submit response: {r.status_code} {r.text}")
              sys.exit(1)
          PYEOF

name: Submit to App Store Review

on:
  workflow_dispatch:

jobs:
  submit:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Submit to App Store Review via fastlane
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          echo "$ASC_PRIVATE_KEY" > /tmp/asc_key.p8
          gem install fastlane --no-document

          # Write api key json
          node -e "
            const fs = require('fs');
            fs.writeFileSync('/tmp/api_key.json', JSON.stringify({
              key_id: process.env.ASC_KEY_ID,
              issuer_id: process.env.ASC_ISSUER_ID,
              key: fs.readFileSync('/tmp/asc_key.p8','utf8'),
              duration: 1200,
              in_house: false
            }));
          "

          fastlane deliver \
            --api_key_path /tmp/api_key.json \
            --app_identifier ch.architectdna.voidfreq \
            --submit_for_review true \
            --automatic_release false \
            --skip_binary_upload true \
            --skip_screenshots true \
            --skip_metadata true \
            --force true \
            --price_tier 0 \
            --submission_information '{"add_id_info_uses_idfa":false,"add_id_info_serves_ads":false,"add_id_info_tracks_action":false,"add_id_info_tracks_install":false,"content_rights_has_rights":true,"content_rights_contains_third_party_content":false,"export_compliance_platform":"ios","export_compliance_compliance_required":false,"export_compliance_encryption_updated":false,"export_compliance_app_type":null,"export_compliance_uses_encryption":false,"export_compliance_is_exempt":false,"export_compliance_contains_third_party_cryptography":false,"export_compliance_contains_proprietary_cryptography":false,"export_compliance_available_on_french_store":false}'
